name: Voidrepo Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mostrar ambiente
        run: |
          echo "User: $(whoami)"
          echo "Host: $(hostname)"
          uname -a
          df -h


      - name: Setup TMATE Session in CONTAINER
        uses: mxschmitt/action-tmate@v3
        #if: env.DEBUG == 'true'
        with:
          install-dependencies: false
          detached: true
